name: Deploy to Server

on:
  push:
    branches:
      - main  # Ou sua branch principal

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}     # Adicione no GitHub Settings > Secrets
          username: ${{ secrets.SERVER_USER }} # Adicione no GitHub Settings > Secrets
          key: ${{ secrets.SSH_PRIVATE_KEY }}  # Adicione no GitHub Settings > Secrets
          script: |
            cd /caminho/para/seu/projeto/Tust-AETE
            git pull origin main
            chmod +x deploy.sh
            ./deploy.sh
