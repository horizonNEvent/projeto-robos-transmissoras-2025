services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    restart: always
    volumes:
      - .:/app
      - ./downloads:/app/downloads
    # Para Selenium funcionar dentro do container precisa de configuração extra
    # ou usar um serviço selenium grid externo

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    volumes:
      - ./app/frontend:/app
      - /app/node_modules
    restart: always
    environment:
      - CHOKIDAR_USEPOLLING=true
